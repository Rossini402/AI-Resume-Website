<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>简历 · XXX — AI Native 工程师</title>
<meta name="description" content="AI Native 前端工程师简历 — 以 AI-Native 方式驱动前端工程，Claude Code 深度用户，覆盖 10+ 项目的人-AI 协作体系。">
<meta property="og:title" content="XXX — AI Native 前端工程师">
<meta property="og:description" content="以 AI-Native 方式驱动前端工程，Claude Code 深度用户，覆盖 10+ 项目的人-AI 协作体系。">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.loli.net" crossorigin>
<link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="resume/styles/v1.css"/>
<link rel="stylesheet" href="resume/styles/v2.css"/>

<style>
  html, body { background: #f5f4ef; }
  body { margin: 0; }

  /* Boot loader */
  .boot-loader {
    position: fixed; inset: 0;
    background: #0d0d0d;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  .boot-loader.out { opacity: 0; visibility: hidden; pointer-events: none; }
  .boot-box {
    width: min(680px, 90vw);
    background: #141414;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    font-family: "JetBrains Mono", ui-monospace, monospace;
  }
  .boot-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
  }
  .boot-bar .bd { width: 11px; height: 11px; border-radius: 50%; }
  .boot-bar .bd.r { background: #ff5f57; }
  .boot-bar .bd.y { background: #febc2e; }
  .boot-bar .bd.g { background: #28c840; }
  .boot-path {
    margin-left: 12px;
    font-size: 11.5px;
    color: #888;
  }
  .boot-body {
    padding: 26px 28px 30px;
    font-size: 13.5px;
    color: #e8e8e8;
    line-height: 2;
    min-height: 220px;
  }
  .boot-line { display: flex; gap: 10px; align-items: baseline; }
  .boot-prompt { color: oklch(0.72 0.14 150); }
  .boot-muted { color: #9ca3af; }
  .boot-accent { color: oklch(0.78 0.15 60); }
  .boot-caret {
    display: inline-block; width: 7px; height: 14px;
    background: oklch(0.72 0.14 150);
    margin-left: 2px;
    animation: bootBlink 1s steps(2) infinite;
    transform: translateY(2px);
  }
  @keyframes bootBlink { 50% { opacity: 0; } }

  .boot-skip {
    position: absolute;
    bottom: 20px;
    right: 24px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: #555;
    background: transparent;
    border: 1px solid #333;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .boot-skip:hover { color: #aaa; border-color: #555; }

  /* variant switcher pill */
  .variant-switch {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9999;
    display: flex; gap: 2px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    border: 1px solid #e4e4e0;
    border-radius: 999px;
    padding: 3px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11.5px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    opacity: 0;
    transition: opacity 0.4s ease 0.1s;
  }
  .variant-switch.ready { opacity: 1; }
  .variant-switch button {
    border: none;
    background: transparent;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    color: #6b6b68;
    font-family: inherit;
    font-size: inherit;
  }
  .variant-switch button.on {
    background: #1a1a1a;
    color: #fafafa;
  }
  .variant-switch button:hover:not(.on) { color: #1a1a1a; }

  /* 设置按钮 */
  .tweaks-toggle {
    border: none;
    background: transparent;
    padding: 6px 10px;
    border-radius: 999px;
    cursor: pointer;
    color: #6b6b68;
    font-family: inherit;
    font-size: inherit;
    border-left: 1px solid #e4e4e0;
    margin-left: 2px;
  }
  .tweaks-toggle:hover { color: #1a1a1a; }

  .view { display: none; }
  .view.active { display: block; }

  @media (max-width: 480px) {
    .variant-switch { font-size: 10.5px; }
    .variant-switch button { padding: 5px 10px; }
  }
</style>

<!-- fixed tweak defaults — host rewrites this block -->
<script>
/*EDITMODE-BEGIN*/
window.TWEAK_DEFAULTS = {
  "variant": "v1",
  "v1_fontFamily": "mixed",
  "v1_density": "comfy",
  "v1_order": "default",
  "v1_accent": "green",
  "v2_theme": "light",
  "v2_accent": "green",
  "v2_density": "comfy"
};
/*EDITMODE-END*/
</script>
</head>
<body>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- MD 解析器（纯 JS） -->
<script src="resume/md-parser.js"></script>

<!-- 共享组件 -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="resume/components/v1-app.jsx"></script>
<script type="text/babel" src="resume/components/v2-app.jsx"></script>

<div class="boot-loader" id="bootLoader">
  <div class="boot-box">
    <div class="boot-bar">
      <span class="bd r"></span><span class="bd y"></span><span class="bd g"></span>
      <span class="boot-path">~/resume — zsh</span>
    </div>
    <div class="boot-body" id="bootBody"></div>
  </div>
  <button class="boot-skip" id="bootSkip" onclick="window.__skipBoot && window.__skipBoot()">Skip ↵</button>
</div>

<div class="variant-switch" id="variantSwitch">
  <button data-v="v1" class="on">V1 · 现代工程师</button>
  <button data-v="v2">V2 · IDE 风</button>
  <button class="tweaks-toggle" id="tweaksBtn" title="调参面板">⚙</button>
</div>

<div id="root-v1" class="view active"></div>
<div id="root-v2" class="view"></div>

<script type="text/babel">
  // 从 Markdown 加载简历数据，然后渲染
  fetch('uploads/简历.md')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(md => {
      window.RESUME_DATA = window.parseResumeMd(md);

      ReactDOM.createRoot(document.getElementById("root-v1")).render(<ResumeV1 />);
      ReactDOM.createRoot(document.getElementById("root-v2")).render(<ResumeV2 />);

      const buttons = document.querySelectorAll("#variantSwitch button[data-v]");
      const views = {
        v1: document.getElementById("root-v1"),
        v2: document.getElementById("root-v2"),
      };
      function setVariant(v) {
        Object.entries(views).forEach(([k, el]) => el.classList.toggle("active", k === v));
        buttons.forEach(b => b.classList.toggle("on", b.dataset.v === v));
        try { localStorage.setItem("resume-variant", v); } catch (e) {}
      }
      buttons.forEach(b => b.addEventListener("click", () => setVariant(b.dataset.v)));
      try {
        const saved = localStorage.getItem("resume-variant");
        if (saved && views[saved]) setVariant(saved);
      } catch (e) {}
    })
    .catch(err => console.error('简历加载失败:', err));
</script>

<script>
  // Boot typewriter loader（二次访问自动跳过）
  (function () {
    function dismiss() {
      const loader = document.getElementById("bootLoader");
      if (!loader) return;
      loader.classList.add("out");
      document.getElementById("variantSwitch").classList.add("ready");
      setTimeout(() => { if (loader.parentNode) loader.remove(); }, 600);
      try { localStorage.setItem("resume-boot-seen", "1"); } catch (e) {}
    }

    // 二次访问直接跳过
    try {
      if (localStorage.getItem("resume-boot-seen")) {
        dismiss();
        return;
      }
    } catch (e) {}

    // Skip 按钮 + 键盘 Enter/Escape 跳过
    window.__skipBoot = dismiss;
    document.addEventListener("keydown", function onKey(e) {
      if (e.key === "Enter" || e.key === "Escape") {
        dismiss();
        document.removeEventListener("keydown", onKey);
      }
    });

    const lines = [
      { p: "$", t: "whoami" },
      { p: ">", t: "XXX — AI Native 前端工程师", c: "muted" },
      { p: "$", t: "./boot-resume.sh --mode=engineer" },
      { p: ">", t: "initializing typography... loading sections... ready ✓", c: "muted" },
    ];
    const body = document.getElementById("bootBody");
    let li = 0, ci = 0;
    let row = null, textEl = null, caretEl = null;

    function start() {
      row = document.createElement("div"); row.className = "boot-line";
      const p = document.createElement("span"); p.className = "boot-prompt"; p.textContent = lines[li].p;
      textEl = document.createElement("span");
      if (lines[li].c) textEl.className = "boot-" + lines[li].c;
      caretEl = document.createElement("span"); caretEl.className = "boot-caret";
      row.appendChild(p); row.appendChild(textEl); row.appendChild(caretEl);
      body.appendChild(row);
    }

    function tick() {
      if (!document.getElementById("bootLoader")) return; // 已被 skip
      if (li >= lines.length) {
        setTimeout(dismiss, 350);
        return;
      }
      if (!row) start();
      const L = lines[li].t;
      if (ci < L.length) {
        textEl.textContent += L[ci]; ci++;
        setTimeout(tick, 18 + Math.random() * 28);
      } else {
        if (li < lines.length - 1) caretEl.remove();
        li++; ci = 0; row = null;
        setTimeout(tick, 180);
      }
    }
    tick();
  })();

  // 设置按钮：切换 Tweaks 面板
  document.getElementById("tweaksBtn").addEventListener("click", function () {
    window.postMessage({ type: "__activate_edit_mode" }, "*");
  });
</script>

</body>
</html>
